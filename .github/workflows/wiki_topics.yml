name: Update Wiki topic index

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1" # elke maandag 07:00 UTC

permissions:
  contents: write

jobs:
  update-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v4

      - name: Fetch repos + topics and generate wiki pages
        env:
          GH_TOKEN: ${{ secrets.READ_WIKI_TOPICS }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import json
          import os
          import re
          import shutil
          import subprocess
          import unicodedata
          from collections import defaultdict

          # ------------------------------------------------------------
          # Config
          # ------------------------------------------------------------
          OUTDIR = "_wiki_out"
          TOPICS_FOLDER_NAME = "Topics"               # visible "folder" name in wiki sidebar
          OVERVIEW_PAGE = "Overview.md"              # generated (dynamic) overview page
          NO_TOPICS_PAGE = "Repos-zonder-topics.md"  # generated list of repos without topics

          # ------------------------------------------------------------
          # Helpers
          # ------------------------------------------------------------
          def gh_graphql(query: str, owner: str, after: str | None):
              """
              Call GitHub GraphQL through `gh api graphql`.

              IMPORTANT:
              - owner is passed with -F so it is treated as a string.
              - after is only passed when it has a value (never pass null).
              """
              cmd = ["gh", "api", "graphql", "-f", f"query={query}", "-F", f"owner={owner}"]
              if after:
                  cmd += ["-F", f"after={after}"]
              out = subprocess.check_output(cmd, text=True)
              return json.loads(out)

          def norm_display(s: str) -> str:
              """
              Normalize for display (keep readable, but remove weird whitespace).
              """
              s = unicodedata.normalize("NFKC", (s or ""))
              s = s.replace("\u00a0", " ")          # NBSP -> normal space
              s = "".join(ch for ch in s if unicodedata.category(ch) != "Cf")  # remove zero-width chars
              s = " ".join(s.strip().split())       # collapse whitespace
              return s

          def slugify(s: str) -> str:
              """
              Stable wiki filename slug:
              - lower
              - unicode normalize
              - remove diacritics
              - keep a-z0-9 and '-'
              """
              s = norm_display(s).lower()
              s = unicodedata.normalize("NFKD", s)
              s = "".join(ch for ch in s if not unicodedata.combining(ch))
              s = re.sub(r"[^a-z0-9]+", "-", s)
              s = re.sub(r"-{2,}", "-", s).strip("-")
              return s or "untitled"

          # ------------------------------------------------------------
          # Main
          # ------------------------------------------------------------
          owner = os.environ.get("GITHUB_REPOSITORY_OWNER")
          if not owner:
              raise RuntimeError("GITHUB_REPOSITORY_OWNER not set (should exist in GitHub Actions)")

          print("Scanning owner:", owner)

          repos_query = r"""
          query($owner:String!, $after:String) {
            repositoryOwner(login: $owner) {
              repositories(first: 100, after: $after, orderBy: {field: UPDATED_AT, direction: DESC}) {
                pageInfo { hasNextPage endCursor }
                nodes {
                  name
                  description
                  url
                  isArchived
                  isFork
                  repositoryTopics(first: 25) {
                    nodes { topic { name } }
                  }
                }
              }
            }
          }
          """

          # Fetch all repos (paging)
          all_repos = []
          after = None
          while True:
              data = gh_graphql(repos_query, owner, after)
              ro = data["data"]["repositoryOwner"]
              if ro is None:
                  raise RuntimeError(
                      f"repositoryOwner(login={owner}) returned null. "
                      "Check owner spelling / token permissions."
                  )

              all_repos.extend(ro["repositories"]["nodes"])
              page = ro["repositories"]["pageInfo"]
              if not page["hasNextPage"]:
                  break
              after = page["endCursor"]

          # Filter out archived/forks
          repos = [r for r in all_repos if not r.get("isArchived") and not r.get("isFork")]
          print(f"Total repos fetched: {len(all_repos)} (after filter: {len(repos)})")

          # Build topic map (dedupe by slug + remove invisible chars)
          topics = defaultdict(list)   # slug -> list[repo]
          topic_display = {}           # slug -> display name (first seen)
          no_topics = []

          for r in repos:
              raw_topics = [n["topic"]["name"] for n in (r.get("repositoryTopics", {}).get("nodes") or [])]
              if not raw_topics:
                  no_topics.append(r)
                  continue

              seen_slugs_for_repo = set()  # avoid same repo added twice per topic
              for raw in raw_topics:
                  display = norm_display(raw)
                  slug = slugify(display)

                  if slug in seen_slugs_for_repo:
                      continue
                  seen_slugs_for_repo.add(slug)

                  if slug not in topic_display:
                      topic_display[slug] = display

                  topics[slug].append(r)

          print(f"Topic keys (unique slugs): {len(topics)} | Repos without topics: {len(no_topics)}")

          # Clean output dir to prevent stale pages from previous runs
          shutil.rmtree(OUTDIR, ignore_errors=True)

          # Prepare output dirs
          topics_dir = os.path.join(OUTDIR, TOPICS_FOLDER_NAME)
          os.makedirs(OUTDIR, exist_ok=True)
          os.makedirs(topics_dir, exist_ok=True)

          # ------------------------------------------------------------
          # 1) Overview.md (dynamic portal page)
          # ------------------------------------------------------------
          overview_lines = [
              "# Overview",
              "",
              "Dit overzicht is automatisch gegenereerd uit GitHub repository topics.",
              "",
              "## Topics",
              "",
          ]

          # Sort topics by number of repos desc, then slug
          for slug in sorted(topics.keys(), key=lambda k: (-len(topics[k]), k)):
              overview_lines.append(
                  f"- [[{TOPICS_FOLDER_NAME}/{slug}|{topic_display[slug]}]] ({len(topics[slug])})"
              )

          overview_lines += [
              "",
              "## Overig",
              "",
              f"- [[{NO_TOPICS_PAGE.replace('.md','')}|Repos zonder topics]] ({len(no_topics)})",
              "",
          ]

          with open(os.path.join(OUTDIR, OVERVIEW_PAGE), "w", encoding="utf-8") as f:
              f.write("\n".join(overview_lines) + "\n")

          # ------------------------------------------------------------
          # 2) Topic pages: Topics/<slug>.md
          # ------------------------------------------------------------
          for slug in sorted(topics.keys(), key=lambda k: (-len(topics[k]), k)):
              display = topic_display[slug]
              lines = [
                  f"# {display}",
                  "",
                  "Terug naar [[Overview]].",
                  "",
              ]

              for r in sorted(topics[slug], key=lambda x: x["name"].lower()):
                  desc = (r.get("description") or "").strip()
                  if desc:
                      lines.append(f"- [{r['name']}]({r['url']}) — {desc}")
                  else:
                      lines.append(f"- [{r['name']}]({r['url']})")

              lines.append("")

              with open(os.path.join(topics_dir, f"{slug}.md"), "w", encoding="utf-8") as f:
                  f.write("\n".join(lines) + "\n")

          # ------------------------------------------------------------
          # 3) Repos-zonder-topics.md
          # ------------------------------------------------------------
          no_topics_lines = [
              "# Repos zonder topics",
              "",
              "Deze repositories hebben nog geen GitHub topics ingesteld.",
              "",
              "Terug naar [[Overview]].",
              "",
          ]

          if not no_topics:
              no_topics_lines.append("_Alles heeft topics. Nice._")
          else:
              for r in sorted(no_topics, key=lambda x: x["name"].lower()):
                  desc = (r.get("description") or "").strip()
                  if desc:
                      no_topics_lines.append(f"- [{r['name']}]({r['url']}) — {desc}")
                  else:
                      no_topics_lines.append(f"- [{r['name']}]({r['url']})")

          no_topics_lines.append("")

          with open(os.path.join(OUTDIR, NO_TOPICS_PAGE), "w", encoding="utf-8") as f:
              f.write("\n".join(no_topics_lines) + "\n")

          print(f"Generated: {OVERVIEW_PAGE}, {TOPICS_FOLDER_NAME}/*, {NO_TOPICS_PAGE} in ./{OUTDIR}/")
          PY

      - name: Clone wiki repo
        env:
          WIKI_TOKEN: ${{ secrets.READ_WIKI_TOPICS }}
        run: |
          rm -rf wiki
          git clone --depth 1 "https://x-access-token:${WIKI_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git" wiki

      - name: Clean generated wiki pages (keep .git and Home.md)
        run: |
          # Verwijder alles behalve .git en Home.md
          find wiki -mindepth 1 -maxdepth 1 \
            ! -name '.git' \
            ! -name 'Home.md' \
            -exec rm -rf {} +
            
      - name: Copy generated pages into wiki repo
        run: |
          rsync -a --delete --exclude '.git' --exclude 'Home.md' _wiki_out/ wiki/

      - name: Commit and push wiki changes
        run: |
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes."
            exit 0
          fi

          git commit -m "Auto-update topic index"
          git push
