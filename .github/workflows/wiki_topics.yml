name: Update Wiki topic index

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1" # elke maandag 07:00 UTC

permissions:
  contents: write

jobs:
  update-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v4

      - name: Fetch repos + topics and generate wiki pages
        env:
          GH_TOKEN: ${{ secrets.READ_WIKI_TOPICS }}
        run: |
          set -euo pipefail

          # 1) Haal jouw repos op + topics (40 repos -> 1 pagina is genoeg; toch maken we paging-proof)
          python3 - <<'PY'
          import json
          import os
          import subprocess
          from collections import defaultdict
          
          # ------------------------------------------------------------
          # Config
          # ------------------------------------------------------------
          OUTDIR = "_wiki_out"
          TOPICS_FOLDER_NAME = "Topics"               # visible "folder" name in wiki sidebar
          OVERVIEW_PAGE = "Overview.md"              # generated (dynamic) overview page
          NO_TOPICS_PAGE = "Repos-zonder-topics.md"  # generated list of repos without topics
          
          # ------------------------------------------------------------
          # GitHub GraphQL helper (uses gh cli + GH_TOKEN from env)
          # ------------------------------------------------------------
          def gh_graphql(query: str, owner: str, after: str | None):
              """
              Call GitHub GraphQL through `gh api graphql`.
          
              IMPORTANT:
              - owner is passed with -F so it is treated as a string.
              - after is only passed when it has a value (never pass null).
              """
              cmd = ["gh", "api", "graphql", "-f", f"query={query}", "-F", f"owner={owner}"]
              if after:
                  cmd += ["-F", f"after={after}"]
              out = subprocess.check_output(cmd, text=True)
              return json.loads(out)
          
          # ------------------------------------------------------------
          # Main
          # ------------------------------------------------------------
          owner = os.environ.get("GITHUB_REPOSITORY_OWNER")
          if not owner:
              raise RuntimeError("GITHUB_REPOSITORY_OWNER not set (should exist in GitHub Actions)")
          
          print("Scanning owner:", owner)
          
          repos_query = r"""
          query($owner:String!, $after:String) {
            repositoryOwner(login: $owner) {
              repositories(first: 100, after: $after, orderBy: {field: UPDATED_AT, direction: DESC}) {
                pageInfo { hasNextPage endCursor }
                nodes {
                  name
                  description
                  url
                  isArchived
                  isFork
                  repositoryTopics(first: 25) {
                    nodes { topic { name } }
                  }
                }
              }
            }
          }
          """
          
          # Fetch all repos (paging)
          all_repos = []
          after = None
          while True:
              data = gh_graphql(repos_query, owner, after)
              ro = data["data"]["repositoryOwner"]
              if ro is None:
                  raise RuntimeError(
                      f"repositoryOwner(login={owner}) returned null. "
                      "Check owner spelling / token permissions."
                  )
          
              all_repos.extend(ro["repositories"]["nodes"])
              page = ro["repositories"]["pageInfo"]
              if not page["hasNextPage"]:
                  break
              after = page["endCursor"]
          
          # Filter out archived/forks (adjust if you want to include them)
          repos = [r for r in all_repos if not r.get("isArchived") and not r.get("isFork")]
          print(f"Total repos fetched: {len(all_repos)} (after filter: {len(repos)})")
          
          # Build topic map
          topics = defaultdict(list)   # topic -> list[repo]
          no_topics = []
          
          for r in repos:
              repo_topics = [n["topic"]["name"] for n in (r.get("repositoryTopics", {}).get("nodes") or [])]
              if not repo_topics:
                  no_topics.append(r)
                  continue
              for t in repo_topics:
                  topics[t.strip().lower()].append(r)
          
          print(f"Topic keys: {len(topics)} | Repos without topics: {len(no_topics)}")
          
          # Prepare output dirs
          topics_dir = os.path.join(OUTDIR, TOPICS_FOLDER_NAME)
          os.makedirs(OUTDIR, exist_ok=True)
          os.makedirs(topics_dir, exist_ok=True)
          
          # ------------------------------------------------------------
          # 1) Overview.md (dynamic portal page)
          # ------------------------------------------------------------
          overview_lines = [
              "# Overview",
              "",
              "Dit overzicht is automatisch gegenereerd uit GitHub repository topics.",
              "",
              "## Topics",
              "",
          ]
          
          # Optional: sort topics by number of repos (descending), then name
          for t in sorted(topics.keys(), key=lambda k: (-len(topics[k]), k)):
              page = t.replace(" ", "-")
              overview_lines.append(f"- [[{TOPICS_FOLDER_NAME}/{page}|{t}]] ({len(topics[t])})")
          
          overview_lines += [
              "",
              "## Overig",
              "",
              f"- [[{NO_TOPICS_PAGE.replace('.md','')}|Repos zonder topics]] ({len(no_topics)})",
              "",
          ]
          
          with open(os.path.join(OUTDIR, OVERVIEW_PAGE), "w", encoding="utf-8") as f:
              f.write("\n".join(overview_lines) + "\n")
          
          # ------------------------------------------------------------
          # 2) Topic pages: Topics/<topic>.md
          # ------------------------------------------------------------
          for t in sorted(topics.keys(), key=lambda k: (-len(topics[k]), k)):
              page = t.replace(" ", "-")
              lines = [
                  f"# {t}",
                  "",
                  "Terug naar [[Overview]].",
                  "",
              ]
          
              for r in sorted(topics[t], key=lambda x: x["name"].lower()):
                  desc = (r.get("description") or "").strip()
                  if desc:
                      lines.append(f"- [{r['name']}]({r['url']}) — {desc}")
                  else:
                      lines.append(f"- [{r['name']}]({r['url']})")
          
              lines.append("")
          
              with open(os.path.join(topics_dir, f"{page}.md"), "w", encoding="utf-8") as f:
                  f.write("\n".join(lines) + "\n")
          
          # ------------------------------------------------------------
          # 3) Repos-zonder-topics.md
          # ------------------------------------------------------------
          no_topics_lines = [
              "# Repos zonder topics",
              "",
              "Deze repositories hebben nog geen GitHub topics ingesteld.",
              "",
              "Terug naar [[Overview]].",
              "",
          ]
          
          if not no_topics:
              no_topics_lines.append("_Alles heeft topics. Nice._")
          else:
              for r in sorted(no_topics, key=lambda x: x["name"].lower()):
                  desc = (r.get("description") or "").strip()
                  if desc:
                      no_topics_lines.append(f"- [{r['name']}]({r['url']}) — {desc}")
                  else:
                      no_topics_lines.append(f"- [{r['name']}]({r['url']})")
          
          no_topics_lines.append("")
          
          with open(os.path.join(OUTDIR, NO_TOPICS_PAGE), "w", encoding="utf-8") as f:
              f.write("\n".join(no_topics_lines) + "\n")
          
          print(f"Generated: {OVERVIEW_PAGE}, {TOPICS_FOLDER_NAME}/*, {NO_TOPICS_PAGE} in ./{OUTDIR}/")
          PY

      - name: Clone wiki repo
        env:
          WIKI_TOKEN: ${{ secrets.READ_WIKI_TOPICS }}
        run: |
          rm -rf wiki
          git clone --depth 1 "https://x-access-token:${WIKI_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git" wiki

      - name: Copy generated pages into wiki repo
        run: |
          rsync -a --delete --exclude '.git' _wiki_out/ wiki/

      - name: Commit and push wiki changes
        run: |
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes."
            exit 0
          fi
          git commit -m "Auto-update topic index"
          git push
