name: Update Wiki topic index

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"

permissions:
  contents: write

jobs:
  update-wiki:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout profile repo
        uses: actions/checkout@v4

      - name: Fetch repos + topics and generate wiki pages
        env:
          GH_TOKEN: ${{ secrets.READ_WIKI_TOPICS }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import json
          import os
          import re
          import shutil
          import subprocess
          import unicodedata
          from collections import defaultdict

          OUTDIR = "_wiki_out"
          TOPICS_FOLDER_NAME = "Topics"
          OVERVIEW_PAGE = "Overview.md"
          NO_TOPICS_PAGE = "Repos-zonder-topics.md"

          def gh_graphql(query: str, owner: str, after: str | None):
              cmd = ["gh", "api", "graphql", "-f", f"query={query}", "-F", f"owner={owner}"]
              if after:
                  cmd += ["-F", f"after={after}"]
              out = subprocess.check_output(cmd, text=True)
              return json.loads(out)

          def normalize_topic(s: str) -> str:
              s = unicodedata.normalize("NFKC", s)
              s = s.replace("\u00a0", " ")
              s = "".join(ch for ch in s if unicodedata.category(ch) != "Cf")
              s = " ".join(s.strip().split())
              return s.lower()

          def slugify(s: str) -> str:
              s = normalize_topic(s)
              s = unicodedata.normalize("NFKD", s)
              s = "".join(ch for ch in s if not unicodedata.combining(ch))
              s = re.sub(r"[^a-z0-9]+", "-", s)
              s = re.sub(r"-{2,}", "-", s).strip("-")
              return s or "topic"

          owner = os.environ["GITHUB_REPOSITORY_OWNER"]
          print("Scanning owner:", owner)

          repos_query = r"""
          query($owner:String!, $after:String) {
            repositoryOwner(login: $owner) {
              repositories(first: 100, after: $after) {
                pageInfo { hasNextPage endCursor }
                nodes {
                  name
                  description
                  url
                  isArchived
                  isFork
                  repositoryTopics(first: 25) {
                    nodes { topic { name } }
                  }
                }
              }
            }
          }
          """

          all_repos = []
          after = None

          while True:
              data = gh_graphql(repos_query, owner, after)
              ro = data["data"]["repositoryOwner"]
              all_repos.extend(ro["repositories"]["nodes"])

              page = ro["repositories"]["pageInfo"]
              if not page["hasNextPage"]:
                  break
              after = page["endCursor"]

          repos = [r for r in all_repos if not r.get("isArchived") and not r.get("isFork")]

          print("Repos after filtering:", len(repos))

          topics = defaultdict(list)
          topic_display = {}
          no_topics = []

          for r in repos:
              raw_topics = [n["topic"]["name"] for n in (r.get("repositoryTopics", {}).get("nodes") or [])]

              if not raw_topics:
                  no_topics.append(r)
                  continue

              seen = set()

              for t in raw_topics:
                  key = slugify(t)

                  if key in seen:
                      continue
                  seen.add(key)

                  if key not in topic_display:
                      topic_display[key] = normalize_topic(t)

                  topics[key].append(r)

          print("Unique topic keys:", len(topics))
          print("Repos without topics:", len(no_topics))

          # clean output
          shutil.rmtree(OUTDIR, ignore_errors=True)

          topics_dir = os.path.join(OUTDIR, TOPICS_FOLDER_NAME)
          os.makedirs(topics_dir, exist_ok=True)

          # Overview
          overview = [
              "# Overview",
              "",
              "Automatisch gegenereerd overzicht van repository topics.",
              "",
              "## Topics",
              ""
          ]

          for slug in sorted(topics.keys()):
              overview.append(f"- [[{TOPICS_FOLDER_NAME}/{slug}|{topic_display[slug]}]]")

          overview += [
              "",
              "## Overig",
              "",
              f"- [[{NO_TOPICS_PAGE.replace('.md','')}]]",
              ""
          ]

          with open(os.path.join(OUTDIR, OVERVIEW_PAGE), "w") as f:
              f.write("\n".join(overview))

          # Topic pages
          for slug in sorted(topics.keys()):
              lines = [
                  f"# {topic_display[slug]}",
                  "",
                  "Terug naar [[Overview]].",
                  ""
              ]

              for r in sorted(topics[slug], key=lambda x: x["name"].lower()):
                  desc = (r.get("description") or "").strip()
                  if desc:
                      lines.append(f"- [{r['name']}]({r['url']}) — {desc}")
                  else:
                      lines.append(f"- [{r['name']}]({r['url']})")

              with open(os.path.join(topics_dir, f"{slug}.md"), "w") as f:
                  f.write("\n".join(lines))

          # repos without topics
          lines = [
              "# Repos zonder topics",
              "",
              "Terug naar [[Overview]].",
              ""
          ]

          for r in sorted(no_topics, key=lambda x: x["name"].lower()):
              desc = (r.get("description") or "").strip()
              if desc:
                  lines.append(f"- [{r['name']}]({r['url']}) — {desc}")
              else:
                  lines.append(f"- [{r['name']}]({r['url']})")

          with open(os.path.join(OUTDIR, NO_TOPICS_PAGE), "w") as f:
              f.write("\n".join(lines))

          print("\n=== Generated files ===")
          for root, dirs, files in os.walk(OUTDIR):
              for file in files:
                  print(os.path.join(root, file))

          PY

      - name: Clone wiki repo
        env:
          WIKI_TOKEN: ${{ secrets.READ_WIKI_TOPICS }}
        run: |
          rm -rf wiki
          git clone --depth 1 "https://x-access-token:${WIKI_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git" wiki

      - name: Copy generated pages
        run: |
          rsync -a --delete --exclude '.git' --exclude 'Home.md' _wiki_out/ wiki/

      - name: Print wiki files
        run: |
          echo "=== Wiki files ==="
          find wiki -type f -name "*.md" | sort

      - name: Commit and push wiki changes
        run: |
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No wiki changes."
            exit 0
          fi

          git commit -m "Auto-update topic index"
          git push
